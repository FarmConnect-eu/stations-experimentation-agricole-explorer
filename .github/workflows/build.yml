name: Rebuild index.html depuis xlsx

on:
  push:
    branches: [main]
    paths:
      - 'data/**.xlsx'
      - 'scripts/**'
  workflow_dispatch:  # bouton manuel "Run workflow"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Regenerer index.html
        run: python3 scripts/build.py

      - name: Commit si modifie
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-rebuild index.html depuis data/*.xlsx"
            git push
          else
            echo "Aucun changement dans index.html"
          fi
